        var stepMins = 15; 

        function generateCategories(startH, endH) {
            let labels = [];
            let bins = [];
            for (let h = startH; h < endH; h++) {
                for (let m = 0; m < 60; m += stepMins) {
                    let displayH = h >= 24 ? h - 24 : h;
                    let label = String(displayH).padStart(2, '0') + ':' + String(m).padStart(2, '0');
                    labels.push(label);
                    bins.push(h + m/60); 
                }
            }
            return { labels, bins };
        }

        function processDensityData(dataIndex, startH, endH) {
            let catData = generateCategories(startH, endH);
            let homeCounts = new Array(catData.labels.length).fill(0);
            let travelCounts = new Array(catData.labels.length).fill(0);
            
            let totalHome = 0;
            let totalTravel = 0;

            rawData.forEach(item => {
                let timeStr = item[dataIndex]; 
                let isTravel = item[9] === 'travel';
                let parts = timeStr.split(':');
                let h = parseInt(parts[0]);
                let m = parseInt(parts[1]);
                let decimalTime = h + m/60;

                if (dataIndex === 1 && decimalTime < 12) { decimalTime += 24; } 

                let minDiff = Infinity;
                let closestIdx = -1;
                for(let i=0; i<catData.bins.length; i++) {
                    let diff = Math.abs(catData.bins[i] - decimalTime);
                    if(diff < minDiff) {
                        minDiff = diff;
                        closestIdx = i;
                    }
                }

                if(closestIdx !== -1) {
                    if(isTravel) { travelCounts[closestIdx]++; totalTravel++; }
                    else { homeCounts[closestIdx]++; totalHome++; }
                }
            });

            // ★ 计算百分比
            let homePerc = homeCounts.map(count => totalHome > 0 ? (count / totalHome * 100).toFixed(2) : 0);
            let travelPerc = travelCounts.map(count => totalTravel > 0 ? (count / totalTravel * 100).toFixed(2) : 0);

            return {
                labels: catData.labels,
                home: homePerc,
                travel: travelPerc,
                homeCount: homeCounts,     // 保留原始数量用于Tooltip显示
                travelCount: travelCounts
            };
        }

        let sleepData = processDensityData(1, 18, 30);
        let wakeData = processDensityData(2, 3, 15);

        function initPolarChart(domId, dataObj, colorHome, colorTravel, startAngleDeg) {
            var chart = echarts.init(document.getElementById(domId));
            
            var option = {
                polar: {
                    radius: ['15%', '85%']
                },
                angleAxis: {
                    type: 'category',
                    data: dataObj.labels,
                    startAngle: startAngleDeg,
                    clockwise: true,
                    axisLabel: { interval: 3, color: '#9a8c98' },
                    splitLine: { show: true, lineStyle: { color: '#eee', type: 'dashed' } }
                },
                radiusAxis: {
                    type: 'value',
                    min: 0,
                    max: 'dataMax', // 或者设置为固定的较大百分比，如 50，方便两图对比
                    // 强制两张图的比例尺一致，我们找到两张图中的最大百分比作为统一上限
                    show: false 
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: function(params) {
                        let idx = params[0].dataIndex;
                        let time = params[0].name;
                        let res = `<b>${time}</b><br/>`;
                        params.forEach(p => {
                            let val = p.value;
                            let count = p.seriesName === 'Home' ? dataObj.homeCount[idx] : dataObj.travelCount[idx];
                            if(val > 0) res += `${p.marker} ${p.seriesName}: <b>${val}%</b> (${count} days)<br/>`;
                        });
                        return res;
                    }
                },
                series: [
                    {
                        name: 'Home',
                        type: 'bar',
                        coordinateSystem: 'polar',
                        data: dataObj.home,
                        itemStyle: { 
                            color: colorHome, 
                            borderRadius: [1, 1, 0, 0], // 调小圆角，让描边更精致
                            // --- 修改这里 ---
                            borderColor: '#7cb1e6', // 蓝色的对应深色
                            borderWidth: 1.5,       // 线条宽度
                            borderSide: ['top']     // ★ 核心：只描绘顶部，不描绘侧边和底部
                        }
                    },
                    {
                        name: 'Travel',
                        type: 'bar',
                        coordinateSystem: 'polar',
                        barGap: '-100%', // 保持完全重叠
                        data: dataObj.travel,
                        itemStyle: { 
                            color: colorTravel, 
                            borderRadius: [1, 1, 0, 0],
                            // --- 修改这里 ---
                            borderColor: '#f08ba0', // 粉色的对应深色
                            borderWidth: 1.5,
                            borderSide: ['top']     // ★ 核心：只描绘顶部
                        } 
                    }
                ]
            };
            chart.setOption(option);
            return chart;
        }

        var colorHome = 'rgba(189, 224, 254, 0.75)';
        var colorTravel = 'rgba(255, 175, 204, 0.75)';

        // 初始化图表
        var sleepChart = initPolarChart('sleepChart', sleepData, colorHome, colorTravel, -90);
        var wakeChart = initPolarChart('wakeChart', wakeData, colorHome, colorTravel, 0);

        // ★ 确保两张图的半径比例尺（百分比长度）绝对一致
        // 我们获取两张图中所有百分比的最大值，并同步给两个图表
        let maxVal = Math.max(
            ...sleepData.home, ...sleepData.travel, 
            ...wakeData.home, ...wakeData.travel
        );
        // 向上取整到 5 的倍数
        let uniformMax = Math.ceil(maxVal / 5) * 5;

        sleepChart.setOption({ radiusAxis: { max: uniformMax } });
        wakeChart.setOption({ radiusAxis: { max: uniformMax } });

            sleepChart.resize();
