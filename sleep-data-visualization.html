<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tracking My Sleep</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { 
            background-color: #f8f4f9; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 40px; color: #4a4e69;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        h1 { color: #9a8c98; font-size: 2.5rem; margin-bottom: 10px; letter-spacing: -1px; }
        
        .chart-card {
            background: #fff; border-radius: 24px;
            box-shadow: 0 10px 40px rgba(154, 140, 152, 0.1);
            padding: 30px; margin-bottom: 40px;
        }
        h2 { font-size: 1.2rem; color: #9a8c98; margin-top: 0; border-left: 4px solid #cdb4db; padding-left: 15px; }

        .legend { display: flex; justify-content: center; gap: 30px; margin: 20px 0; font-size: 14px; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }
        .dot.home { background: #bde0fe; }
        .dot.travel { background: #ffafcc; }

        #timelineChart { width: 100%; height: 600px; }
        #radialChart { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Tracking My Sleep</h1>
            <div class="legend">
                <div class="legend-item"><div class="dot home"></div><span>Home Routine</span></div>
                <div class="legend-item"><div class="dot travel"></div><span>Travel / Irregular</span></div>
            </div>
        </div>

        <div class="chart-card">
            <h2>Daily Sleep Rhythm</h2>
            <div id="timelineChart"></div>
        </div>

        <div class="chart-card">
            <h2>Consistency Analysis (Home vs. Travel)</h2>
            <p style="font-size: 13px; color: #999;">Aggregated density of sleep hours. A wider, smoother "peak" indicates a stable rhythm.</p>
            <div id="radialChart"></div>
        </div>
    </div>

    <script>
        // --- DATA PROCESSING ---
        const rawData = [
            ['2026-01-01', '3:12', '9:16', 364, 0, 0, 77, 441, 'fair', 'normal', 'drink+party'],
            ['2026-01-02', '0:02', '8:17', 487, 1, 8, 57, 544, 'fair', 'normal', ''],
            ['2026-01-03', '1:33', '8:35', 422, 0, 0, 82, 504, 'fair', 'normal', ''],
            ['2026-01-04', '6:50', '10:15', 205, 0, 0, 221, 426, 'fair', 'normal', ''],
            ['2026-01-05', '1:56', '7:36', 340, 0, 0, 108, 448, 'fair', 'normal', ''],
            ['2026-01-06', '23:55', '9:38', 583, 0, 0, 98, 681, 'fair', 'normal', ''],
            ['2026-01-07', '1:09', '8:29', 440, 0, 0, 125, 565, 'fair', 'normal', ''],
            ['2026-01-08', '2:58', '9:32', 375, 1, 19, 230, 605, 'poor', 'normal', '??'],
            ['2026-01-09', '1:37', '7:11', 334, 0, 0, 216, 550, 'fair', 'normal', ''],
            ['2026-01-10', '1:26', '8:58', 452, 0, 0, 41, 493, 'fair', 'normal', ''],
            ['2026-01-11', '23:50', '7:52', 482, 0, 0, 0, 482, 'fair', 'normal', ''],
            ['2026-01-12', '1:05', '8:40', 455, 0, 0, 0, 455, 'fair', 'normal', ''],
            ['2026-01-13', '0:17', '8:39', 502, 0, 0, 0, 502, 'fair', 'normal', ''],
            ['2026-01-14', '2:24', '8:00', 336, 0, 0, 0, 336, 'poor', 'normal', ''],
            ['2026-01-15', '0:43', '6:52', 369, 0, 0, 60, 429, 'fair', 'normal', ''],
            ['2026-01-16', '0:34', '11:25', 573, 2, 78, 0, 573, 'fair', 'normal', ''],
            ['2026-01-17', '0:40', '7:42', 422, 0, 0, 170, 592, 'good', 'normal', ''],
            ['2026-01-18', '0:02', '8:53', 531, 0, 0, 29, 560, 'fair', 'normal', ''],
            ['2026-01-19', '1:01', '9:44', 521, 1, 2, 0, 521, 'fair', 'normal', ''],
            ['2026-01-20', '1:07', '9:02', 475, 0, 0, 33, 508, 'fair', 'normal', ''],
            ['2026-01-21', '0:38', '10:01', 563, 0, 0, 0, 563, 'fair', 'normal', ''],
            ['2026-01-22', '0:26', '9:16', 530, 0, 0, 0, 530, 'good', 'normal', ''],
            ['2026-01-23', '23:50', '8:03', 493, 0, 0, 0, 493, 'fair', 'normal', ''],
            ['2026-01-24', '1:18', '7:29', 371, 0, 0, 70, 441, 'fair', 'normal', ''],
            ['2026-01-25', '1:11', '4:45', 148, 3, 66, 82, 230, 'poor', 'travel', 'Airpot'],
            ['2026-01-26', '1:13', '6:35', 321, 1, 1, 0, 321, 'fair', 'travel', ''],
            ['2026-01-27', '1:49', '7:11', 322, 0, 0, 25, 347, 'fair', 'travel', ''],
            ['2026-01-28', '1:40', '4:15', 116, 2, 39, 139, 255, 'poor', 'travel', 'Night Bus'],
            ['2026-01-29', '0:02', '7:26', 444, 0, 0, 0, 444, 'fair', 'travel', ''],
            ['2026-01-30', '1:12', '7:20', 368, 0, 0, 0, 368, 'fair', 'travel', ''],
            ['2026-01-31', '0:18', '9:10', 532, 0, 0, 90, 622, 'fair', 'travel', ''],
            ['2026-02-01', '1:35', '3:15', 100, 0, 0, 117, 217, 'poor', 'travel', 'Airport again'],
            ['2026-04-13', '2:15', '4:42', 147, 0, 0, 293, 293, 'poor', 'travel', 'Barcelona'],
            ['2026-04-19', '19:14', '7:08', 683, 3, 31, 683, 683, 'fair', 'normal', ''],
            ['2026-04-20', '23:23', '8:40', 557, 0, 0, 595, 595, 'fair', 'normal', '']
        ];

        // Process Radial Data (Frequency per hour)
        let homeFreq = new Array(24).fill(0);
        let travelFreq = new Array(24).fill(0);

        rawData.forEach(item => {
            let startH = parseInt(item[1].split(':')[0]);
            let endH = parseInt(item[2].split(':')[0]);
            let type = item[9];
            
            // Simplified: Fill hours between start and end
            let h = startH;
            while (h != endH) {
                if (type === 'normal') homeFreq[h]++;
                else travelFreq[h]++;
                h = (h + 1) % 24;
            }
        });

        // --- CHART 1: TIMELINE ---
        const timelineChart = echarts.init(document.getElementById('timelineChart'));
        function parseT(t, next) {
            let p = t.split(':');
            let d = new Date(2026,0,1,p[0],p[1]);
            if(next) d.setDate(d.getDate()+1);
            return d.getTime();
        }

        timelineChart.setOption({
            tooltip: { trigger: 'item' },
            grid: { top: 40, bottom: 40, left: 100, right: 40 },
            xAxis: { type: 'time', position: 'top', axisLabel: {formatter: '{HH}:00'} },
            yAxis: { type: 'category', data: rawData.map(d=>d[0]), inverse: true },
            series: [{
                type: 'custom',
                renderItem: (params, api) => {
                    let catIdx = api.value(0);
                    let start = api.coord([api.value(1), catIdx]);
                    let end = api.coord([api.value(2), catIdx]);
                    return {
                        type: 'rect',
                        shape: { x: start[0], y: start[1]-6, width: end[0]-start[0], height: 12 },
                        style: api.style()
                    };
                },
                data: rawData.map((d, i) => {
                    let h = parseInt(d[1].split(':')[0]);
                    let s = parseT(d[1], h < 18);
                    let e = parseT(d[2], true);
                    return { value: [i, s, e], itemStyle: { color: d[9]==='travel'?'#ffafcc':'#bde0fe' } };
                })
            }]
        });

        // --- CHART 2: RADIAL CONSISTENCY ---
        const radialChart = echarts.init(document.getElementById('radialChart'));
        const hoursAxis = Array.from({length: 24}, (_, i) => i + ':00');

        radialChart.setOption({
            polar: { radius: [30, '80%'] },
            angleAxis: { type: 'category', data: hoursAxis, startAngle: 90, clockwise: true },
            radiusAxis: { show: false },
            tooltip: { trigger: 'axis' },
            series: [
                {
                    name: 'Home Routine',
                    type: 'bar',
                    data: homeFreq,
                    coordinateSystem: 'polar',
                    itemStyle: { color: 'rgba(189, 224, 254, 0.6)' },
                    stack: 'a'
                },
                {
                    name: 'Travel Rhythm',
                    type: 'bar',
                    data: travelFreq,
                    coordinateSystem: 'polar',
                    itemStyle: { color: 'rgba(255, 175, 204, 0.6)' },
                    stack: 'b'
                }
            ]
        });
    </script>
</body>
</html>
