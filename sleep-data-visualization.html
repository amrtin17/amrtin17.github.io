    <style>
        /* 页面整体风格 */
        body { 
            background-color: #f8f4f9; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 20px; 
            color: #5c4d7d;
        }
        
        .header { text-align: center; margin-bottom: 30px; }
        h1 { color: #cdb4db; margin-bottom: 10px; }
        
        /* --- 新增：图例样式 --- */
        .legend-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: 500;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .dot.home { background-color: #bde0fe; border-color: #a2d2ff; }   /* 蓝色 */
        .dot.travel { background-color: #ffafcc; border-color: #ffc8dd; } /* 粉色 */
        /* ---------------------- */

        #mainChart { 
            width: 100%; 
            height: 900px; 
            background: #fff; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(205, 180, 219, 0.3); 
            padding: 10px;
        }
    </style>
</head>
