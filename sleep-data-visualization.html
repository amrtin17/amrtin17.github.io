<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tracking My Sleep</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { 
            background-color: #f8f4f9; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            padding: 40px; 
            color: #4a4e69;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { color: #cdb4db; font-size: 2.5rem; margin-bottom: 10px; }
        p { opacity: 0.7; font-size: 14px; }
        
        #mainChart { 
            width: 100%; 
            height: 900px; 
            background: #fff; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(154, 140, 152, 0.1); 
            padding: 20px;
        }

        /* Legend Style */
        .legend { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; font-size: 14px; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }
        .dot.home { background: #bde0fe; }
        .dot.travel { background: #ffafcc; }
        .dot.night { background: rgba(200, 200, 200, 0.15); border: 1px dashed #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌙 Tracking My Sleep</h1>
            <div class="legend">
                <div class="legend-item"><div class="dot home"></div><span>Home Routine</span></div>
                <div class="legend-item"><div class="dot travel"></div><span>Travel / Irregular</span></div>
                <div class="legend-item"><div class="dot night"></div><span>Typical Night (23:00 - 07:00)</span></div>
            </div>
            <p>Hover to see details | Scroll to zoom timeline</p>
        </div>

        <div id="mainChart"></div>
    </div>

    <script>
        var myChart = echarts.init(document.getElementById('mainChart'));

        // 1. Raw Data
        var rawData = [
            ['2026-01-01', '3:12', '9:16', 364, 0, 0, 77, 441, 'fair', 'normal', 'drink+party'],
            ['2026-01-02', '0:02', '8:17', 487, 1, 8, 57, 544, 'fair', 'normal', ''],
            ['2026-01-03', '1:33', '8:35', 422, 0, 0, 82, 504, 'fair', 'normal', ''],
            ['2026-01-04', '6:50', '10:15', 205, 0, 0, 221, 426, 'fair', 'normal', ''],
            ['2026-01-05', '1:56', '7:36', 340, 0, 0, 108, 448, 'fair', 'normal', ''],
            ['2026-01-06', '23:55', '9:38', 583, 0, 0, 98, 681, 'fair', 'normal', ''],
            ['2026-01-07', '1:09', '8:29', 440, 0, 0, 125, 565, 'fair', 'normal', ''],
            ['2026-01-08', '2:58', '9:32', 375, 1, 19, 230, 605, 'poor', 'normal', ''],
            ['2026-01-25', '1:11', '4:45', 148, 3, 66, 82, 230, 'poor', 'travel', 'Airport sleep'],
            ['2026-01-26', '1:13', '6:35', 321, 1, 1, 0, 321, 'fair', 'travel', ''],
            ['2026-02-06', '1:47', '6:41', 294, 0, 0, 294, 294, 'fair', 'travel', 'Fly to Paris'],
            ['2026-02-12', '0:30', '3:37', 187, 0, 0, 275, 275, 'poor', 'travel', 'Night Bus'],
            ['2026-04-13', '2:15', '4:42', 147, 0, 0, 293, 293, 'poor', 'travel', 'Fly to Barcelona'],
            ['2026-04-19', '19:14', '7:08', 683, 3, 31, 683, 683, 'fair', 'normal', ''],
            ['2026-04-20', '23:23', '8:40', 557, 0, 0, 595, 595, 'fair', 'normal', '']
            // ... (Rest of your data here)
        ];

        function parseTime(timeStr, isNextDay) {
            var parts = timeStr.split(':');
            var date = new Date(2026, 0, 1, parseInt(parts[0]), parseInt(parts[1]));
            if (isNextDay) date.setDate(date.getDate() + 1);
            return date.getTime();
        }

        var yData = [];
        var seriesData = [];

        rawData.forEach(function (item, index) {
            var date = item[0];
            yData.push(date);

            var sleepH = parseInt(item[1].split(':')[0]);
            var sleepTime = parseTime(item[1], sleepH < 18); // If before 18:00, assume it's AM (Next Day)
            var wakeTime = parseTime(item[2], true);

            seriesData.push({
                name: date,
                value: [index, sleepTime, wakeTime, item[3], item[9], item[10]],
                itemStyle: {
                    color: item[9] === 'travel' ? '#ffafcc' : '#bde0fe',
                    borderRadius: 4
                }
            });
        });

        var option = {
            tooltip: {
                backgroundColor: 'rgba(255, 255, 255, 0.95)',
                formatter: function (params) {
                    let s = new Date(params.value[1]);
                    let w = new Date(params.value[2]);
                    let sTime = s.getHours().toString().padStart(2,'0') + ':' + s.getMinutes().toString().padStart(2,'0');
                    let wTime = w.getHours().toString().padStart(2,'0') + ':' + w.getMinutes().toString().padStart(2,'0');
                    let note = params.value[5] ? `<br/>📝 Note: ${params.value[5]}` : '';
                    return `<b>${params.name}</b><br/>🌙 Bedtime: ${sTime}<br/>⏰ Wakeup: ${wTime}${note}`;
                }
            },
            xAxis: {
                type: 'time',
                position: 'top',
                axisLabel: { formatter: '{HH}:{mm}', color: '#9a8c98' },
                min: parseTime('18:00', false),
                max: parseTime('14:00', true),
                splitLine: { lineStyle: { color: '#f0f0f0' } }
            },
            yAxis: {
                type: 'category',
                data: yData,
                inverse: true,
                axisLine: { show: false },
                axisLabel: { color: '#9a8c98', fontSize: 11 }
            },
            grid: { top: 60, bottom: 20, left: 100, right: 40 },
            series: [{
                type: 'custom',
                renderItem: function (params, api) {
                    var categoryIndex = api.value(0);
                    var start = api.coord([api.value(1), categoryIndex]);
                    var end = api.coord([api.value(2), categoryIndex]);
                    var height = api.size([0, 1])[1] * 0.5;
                    return {
                        type: 'rect',
                        shape: { x: start[0], y: start[1] - height/2, width: Math.max(end[0] - start[0], 2), height: height },
                        style: api.style()
                    };
                },
                // --- 这里是新增的昼夜背景遮罩 ---
                markArea: {
                    silent: true, // 鼠标悬浮不触发事件，不影响看数据
                    itemStyle: {
                        color: 'rgba(150, 150, 150, 0.08)' // 浅灰色的半透明遮罩
                    },
                    data: [[
                        {
                            name: 'Night',
                            xAxis: parseTime('23:00', false), // 开始时间：前一天 23:00
                            label: { show: false }
                        },
                        {
                            xAxis: parseTime('07:00', true)   // 结束时间：后一天 07:00
                        }
                    ]]
                },
                data: seriesData
            }]
        };

        myChart.setOption(option);
        window.onresize = function() { myChart.resize(); };
    </script>
</body>
</html>
