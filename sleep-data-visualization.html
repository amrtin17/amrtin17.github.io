            var dayNap = item[6];

            var type = item[9];
            var note = item[10];

            var sleepDateTime = new Date(wakeDateStr + 'T' + sleepTimeStr + ':00');

            }

                name: wakeDateStr,
                value: [
                    yAxisCategories.length - 1, 
                    sleepDateTime.getTime(),    
                    wakeDateTime.getTime(),     
                    nightSleep, dayNap, total, type, note

                itemStyle: {
                    color: barColor,
                    borderColor: borderColor,
                    borderWidth: 1.5,
                    borderRadius: [4, 4, 4, 4]

                    var wakeTime = new Date(params.value[2]);
                    
                    var sTime = sleepTime.getHours().toString().padStart(2, '0') + ':' + sleepTime.getMinutes().toString().padStart(2, '0');
                    var wTime = wakeTime.getHours().toString().padStart(2, '0') + ':' + wakeTime.getMinutes().toString().padStart(2, '0');
                    
                    var nightMins = params.value[3];
                    var napMins = params.value[4];
                    var type = params.value[6];
                    var note = params.value[7];

                    var typeStr = type === 'travel' ? '✈️ 旅行中' : '🏠 正常';
                    var noteHtml = note ? `<br/><span style="color:#d9534f; font-size:12px;">📝 备注: ${note}</span>` : '';

                        <div style="font-weight:bold; border-bottom: 1px solid #eee; margin-bottom: 5px; padding-bottom: 5px;">
                            📅 ${params.name} | ${typeStr}
                        </div>
                        🛌 入睡：${sTime}<br/>
                        ⏰ 醒来：${wTime}<br/>
                        🌙 夜间：${Math.floor(nightMins/60)}小时${nightMins%60}分钟
                        ${napHtml}
                        ${noteHtml}
                    `;
                }
            },

                left: '3%',
                right: '4%',
                bottom: '10%',
                containLabel: true
            },
            xAxis: {
                type: 'time',
                position: 'top',
                splitLine: {
                    lineStyle: { type: 'dashed', color: '#e9ecef' }
                },
                axisLabel: {
                    formatter: '{HH}:{mm}',
                    color: colors.textEmphasis
                }
            },
            yAxis: {
                type: 'category',
                data: yAxisCategories,
                inverse: true,
                axisLine: { lineStyle: { color: colors.purple } },
                axisLabel: { color: colors.textEmphasis, fontWeight: 'bold' }
            },
            dataZoom: [
                {
                    type: 'inside', // 鼠标滚轮缩放
                    xAxisIndex: 0,
                    filterMode: 'weakFilter'
                }
            ],
            series: [
                {
                    type: 'custom',
                    name: '睡眠区间',
                    renderItem: function (params, api) {
                        var categoryIndex = api.value(0);
                        var start = api.coord([api.value(1), categoryIndex]);
                        var end = api.coord([api.value(2), categoryIndex]);
                        var height = api.size([0, 1])[1] * 0.5;

                        return {
                            type: 'rect',
                            shape: {
                                x: start[0],
                                y: start[1] - height / 2,
                                width: end[0] - start[0],
                                height: height
                            },
                            style: api.style()
                        };
                    },

                    emphasis: {
                        focus: 'data',
                        blurScope: 'coordinateSystem',

                            color: colors.pinkDark,
                            borderColor: colors.purple,
                            shadowBlur: 10,
                            shadowColor: 'rgba(205, 180, 219, 0.5)'
                        }
                    }
                }
            ]
