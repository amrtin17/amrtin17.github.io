        // 2. 转换时间到“虚拟同一天”以适应 X 轴坐标
        function parseTime(timeStr, isNextDay) {
            var parts = timeStr.split(':');
            var hours = parseInt(parts[0]);
            var minutes = parseInt(parts[1]);
            // 统一以 2026-01-01 为轴心计算偏移
            var date = new Date(2026, 0, 1, hours, minutes);
            if (isNextDay) date.setDate(date.getDate() + 1);
            return date.getTime();
        }

        var seriesData = [];

            var date = item[0];
            var sleepStr = item[1];
            var wakeStr = item[2];
            
            yData.push(date);

            // 跨天逻辑：如果入睡小时数大于醒来小时数，或者入睡在20点以后，认为入睡是前一天
            var sleepTime, wakeTime;
            var sleepH = parseInt(sleepStr.split(':')[0]);
            
            if (sleepH >= 18) { // 晚上 18:00 后入睡
                sleepTime = parseTime(sleepStr, false);
                wakeTime = parseTime(wakeStr, true);
            } else { // 凌晨入睡
                sleepTime = parseTime(sleepStr, true);
                wakeTime = parseTime(wakeStr, true);
            }

            seriesData.push({
                name: date,
                value: [index, sleepTime, wakeTime, item[3], item[6], item[9], item[10]],
                itemStyle: {
                    color: item[9] === 'travel' ? '#ffafcc' : '#bde0fe'
                }
            });
        });

                min: parseTime('18:00', false), // 从前一天下午6点开始显示
                max: parseTime('14:00', true),  // 到当天下午2点结束
                splitLine: { show: true }
            },
            yAxis: {
                type: 'category',
                data: yData,
                inverse: true
            },
            tooltip: {
                formatter: function (params) {
                    return params.name + '<br/>fall to sleep: ' + new Date(params.value[1]).getHours() + ':' + new Date(params.value[1]).getMinutes() +
                           '<br/>wake up: ' + new Date(params.value[2]).getHours() + ':' + new Date(params.value[2]).getMinutes();
                }
            },
            series: [{
                type: 'custom',
                renderItem: function (params, api) {
                    var categoryIndex = api.value(0);
                    var start = api.coord([api.value(1), categoryIndex]);
                    var end = api.coord([api.value(2), categoryIndex]);
                    var height = api.size([0, 1])[1] * 0.6;
                    return {
                        type: 'rect',
                        shape: { x: start[0], y: start[1] - height/2, width: end[0] - start[0], height: height },
                        style: api.style()
                    };
                },
                data: seriesData
            }]
        };
